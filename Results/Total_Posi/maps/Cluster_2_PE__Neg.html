 = [];\n        const new_x = []; const new_y = []; const new_label = []; const new_smiles = [];\n        const new_deg = []; const new_orig_idx_col = [];\n\n        // NOVAS COLUNAS\n        const new_cor_borda = []; const new_ponto_preto = []; const new_formato = [];\n        const new_tamanho = []; const new_especie = []; const new_alinhamento = [];\n        const new_alinhamento_pe = []; const new_qual_measure = []; const new_cluster = [];\n\n        for (let i = 0; i &lt; nd.index.length; i++) { // nd.index s\u00e3o os \u00edndices originais do grafo (0,1,2...)\n            const current_node_graph_index = nd.index[i];\n            if (connected_graph_indices.has(current_node_graph_index)) {\n                new_graph_indices.push(current_node_graph_index);\n                new_x.push(nd.x[i]);\n                new_y.push(nd.y[i]);\n                new_label.push(nd.label[i]);\n                new_smiles.push(nd.smiles[i]);\n                new_deg.push(nd.degree[i]);\n                if (nd.original_index) { new_orig_idx_col.push(nd.original_index[i]); }\n\n                // ADICIONAR NOVAS COLUNAS\n                new_cor_borda.push(nd.cor_borda[i]);\n                new_ponto_preto.push(nd.ponto_preto_tamanho[i]);\n                new_formato.push(nd.formato_marcador[i]);\n                new_tamanho.push(nd.tamanho_ponto[i]);\n                new_especie.push(nd.especie[i]);\n                new_alinhamento.push(nd.alinhamento[i]);\n                new_alinhamento_pe.push(nd.alinhamento_pe[i]);\n                new_qual_measure.push(nd.qual_measure[i]);\n                new_cluster.push(nd.cluster[i]);\n            }\n        }\n\n        const new_node_data = {\n            index: new_graph_indices,\n            x: new_x, y: new_y, label: new_label, smiles: new_smiles, degree: new_deg,\n\n            // ADICIONAR NOVAS COLUNAS AO DICION\u00c1RIO\n            cor_borda: new_cor_borda,\n            ponto_preto_tamanho: new_ponto_preto,\n            formato_
